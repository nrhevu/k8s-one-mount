apiVersion: v1
kind: ConfigMap
metadata:
  name: miles-rocm-article-env
  namespace: vunguyen13
  labels:
    app: miles-rocm-qwen3-30b-a3b
data:
  RUN_MODE: canary
  MODEL_ROOT: /mnt/miles/models
  DATA_ROOT: /mnt/miles/datasets
  DATA_DIR: /mnt/miles/datasets
  CACHE_ROOT: /mnt/miles/cache
  HF_HOME: /mnt/miles/cache/huggingface
  TRANSFORMERS_CACHE: /mnt/miles/cache/huggingface
  HF_DATASETS_CACHE: /mnt/miles/cache/huggingface/datasets
  TORCH_HOME: /mnt/miles/cache/torch
  PIP_CACHE_DIR: /mnt/miles/cache/pip
  HF_CKPT: /mnt/miles/models/Qwen3-30B-A3B
  REF_CKPT: /mnt/miles/models/Qwen3-30B-A3B_torch_dist
  RUN_BASE: /mnt/miles/runs
  ASSETS_READY: /mnt/miles/state/qwen3-30b-a3b.assets-ready
  MILES_CONTAINER_DIR: /workspace/miles
  MEGATRON_LM_PATH: ""
  ASSET_WAIT_TIMEOUT_SECONDS: "86400"
  HIP_VISIBLE_DEVICES: 0,1,2,3,4,5,6,7
  CUDA_VISIBLE_DEVICES: 0,1,2,3,4,5,6,7
  ROCR_VISIBLE_DEVICES: 0,1,2,3,4,5,6,7
  GPU_DEVICE_ORDINAL: 0,1,2,3,4,5,6,7
  RAY_NUM_CPUS: "64"
  RAY_NUM_GPUS: "8"
  MILES_ALLOW_PORT_CONFLICTS: "0"
  USE_PROMETHEUS: "0"
  PROMETHEUS_PORT: "9090"
  CHECKPOINT_GC_INTERVAL_SECONDS: "60"
  SGLANG_USE_AITER: "0"
  USE_ROCM_AITER_ROPE_BACKEND: "0"
  SGLANG_MOE_RUNNER_BACKEND: triton
  SGLANG_MEM_FRACTION_STATIC: "0.7"
  MAX_TOKENS_PER_GPU: "20480"
  RECOMPUTE_GRANULARITY: full
  RECOMPUTE_METHOD: uniform
  RECOMPUTE_NUM_LAYERS: "1"
  NCCL_DEBUG: VERSION
  NCCL_DEBUG_SUBSYS: INIT
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: miles-rocm-article-scripts
  namespace: vunguyen13
  labels:
    app: miles-rocm-qwen3-30b-a3b
data:
  asset-prep.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    MODEL_ROOT="${MODEL_ROOT:-/mnt/miles/models}"
    DATA_ROOT="${DATA_ROOT:-/mnt/miles/datasets}"
    DATA_DIR="${DATA_DIR:-${DATA_ROOT}}"
    CACHE_ROOT="${CACHE_ROOT:-/mnt/miles/cache}"
    HF_CKPT="${HF_CKPT:-${MODEL_ROOT}/Qwen3-30B-A3B}"
    REF_CKPT="${REF_CKPT:-${MODEL_ROOT}/Qwen3-30B-A3B_torch_dist}"
    ASSETS_READY="${ASSETS_READY:-/mnt/miles/state/qwen3-30b-a3b.assets-ready}"
    MILES_CONTAINER_DIR="${MILES_CONTAINER_DIR:-/workspace/miles}"
    MEGATRON_LM_PATH="${MEGATRON_LM_PATH:-}"
    HIP_VISIBLE_DEVICES="${HIP_VISIBLE_DEVICES:-0,1,2,3,4,5,6,7}"
    CUDA_VISIBLE_DEVICES="${CUDA_VISIBLE_DEVICES:-${HIP_VISIBLE_DEVICES}}"
    ROCR_VISIBLE_DEVICES="${ROCR_VISIBLE_DEVICES:-${HIP_VISIBLE_DEVICES}}"
    GPU_DEVICE_ORDINAL="${GPU_DEVICE_ORDINAL:-${HIP_VISIBLE_DEVICES}}"

    export HF_HOME="${HF_HOME:-${CACHE_ROOT}/huggingface}"
    export TRANSFORMERS_CACHE="${TRANSFORMERS_CACHE:-${HF_HOME}}"
    export HF_DATASETS_CACHE="${HF_DATASETS_CACHE:-${HF_HOME}/datasets}"
    export TORCH_HOME="${TORCH_HOME:-${CACHE_ROOT}/torch}"
    export PIP_CACHE_DIR="${PIP_CACHE_DIR:-${CACHE_ROOT}/pip}"
    export HF_CKPT DATA_DIR
    export HIP_VISIBLE_DEVICES CUDA_VISIBLE_DEVICES ROCR_VISIBLE_DEVICES GPU_DEVICE_ORDINAL
    export HF_TOKEN="${HF_TOKEN:-}"
    export HUGGING_FACE_HUB_TOKEN="${HUGGING_FACE_HUB_TOKEN:-${HF_TOKEN}}"

    mkdir -p "${MODEL_ROOT}" "${DATA_DIR}" "${HF_HOME}" "${TORCH_HOME}" "${PIP_CACHE_DIR}" "$(dirname "${ASSETS_READY}")"
    trap 'rm -f "${ASSETS_READY}"' ERR

    ref_checkpoint_complete() {
      [[ -f "${REF_CKPT}/latest_checkpointed_iteration.txt" ]]
    }

    assets_complete() {
      [[ -f "${HF_CKPT}/config.json" ]] || return 1
      [[ -f "${DATA_DIR}/dapo-math-17k/dapo-math-17k.jsonl" ]] || return 1
      [[ -f "${DATA_DIR}/aime-2024/aime-2024.jsonl" ]] || return 1
      ref_checkpoint_complete || return 1
    }

    if assets_complete; then
      echo "Assets and converted checkpoint are already present."
      touch "${ASSETS_READY}"
      exit 0
    fi

    rm -f "${ASSETS_READY}"
    mkdir -p "${HF_CKPT}" "${REF_CKPT}" "${DATA_DIR}/dapo-math-17k" "${DATA_DIR}/aime-2024"

    python3 - <<'PY'
    from __future__ import annotations

    import os
    from pathlib import Path

    try:
        from huggingface_hub import snapshot_download
    except Exception as exc:  # pragma: no cover - runs inside runtime image
        raise SystemExit(f"huggingface_hub is required in the Miles image: {exc}") from exc


    def download(repo_id: str, local_dir: str, *, repo_type: str | None = None, required: tuple[str, ...]) -> None:
        target = Path(local_dir)
        target.mkdir(parents=True, exist_ok=True)
        print(f"Downloading {repo_id} -> {target}", flush=True)
        kwargs = {"repo_id": repo_id, "local_dir": str(target)}
        if repo_type:
            kwargs["repo_type"] = repo_type
        snapshot_download(**kwargs)
        for relative_path in required:
            required_path = target / relative_path
            if not required_path.exists():
                raise SystemExit(f"missing required downloaded file: {required_path}")
            print(f"verified {required_path} ({required_path.stat().st_size} bytes)", flush=True)


    download("Qwen/Qwen3-30B-A3B", os.environ["HF_CKPT"], required=("config.json",))
    download(
        "zhuzilin/dapo-math-17k",
        str(Path(os.environ["DATA_DIR"]) / "dapo-math-17k"),
        repo_type="dataset",
        required=("dapo-math-17k.jsonl",),
    )
    download(
        "zhuzilin/aime-2024",
        str(Path(os.environ["DATA_DIR"]) / "aime-2024"),
        repo_type="dataset",
        required=("aime-2024.jsonl",),
    )
    PY

    if ! ref_checkpoint_complete; then
      resolve_miles_dir() {
        for candidate in "${MILES_CONTAINER_DIR}" /workspace/miles /root/miles /opt/miles /app/miles; do
          [[ -n "${candidate}" ]] || continue
          if [[ -f "${candidate}/train.py" && -f "${candidate}/scripts/models/qwen3-30B-A3B.sh" ]]; then
            printf '%s\n' "${candidate}"
            return 0
          fi
        done
        return 1
      }

      resolve_megatron_dir() {
        if [[ -n "${MEGATRON_LM_PATH}" && -d "${MEGATRON_LM_PATH}" ]]; then
          printf '%s\n' "${MEGATRON_LM_PATH}"
          return 0
        fi
        for candidate in /workspace/Megatron-LM /root/Megatron-LM /app/Megatron-LM /opt/Megatron-LM; do
          if [[ -d "${candidate}" ]]; then
            printf '%s\n' "${candidate}"
            return 0
          fi
        done
        python3 - <<'PY'
    import importlib.util
    import pathlib
    spec = importlib.util.find_spec("megatron")
    if spec and spec.origin:
        print(pathlib.Path(spec.origin).resolve().parents[1])
    PY
      }

      MILES_DIR="$(resolve_miles_dir || true)"
      MEGATRON_DIR="$(resolve_megatron_dir || true)"
      if [[ -z "${MILES_DIR}" || -z "${MEGATRON_DIR}" ]]; then
        echo "Could not resolve Miles or Megatron source inside the image." >&2
        exit 5
      fi

      echo "Removing incomplete converted checkpoint directory before conversion: ${REF_CKPT}"
      find "${REF_CKPT}" -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +

      cd "${MILES_DIR}"
      source scripts/models/qwen3-30B-A3B.sh
      PYTHONPATH="${MEGATRON_DIR}:${MILES_DIR}:${PYTHONPATH:-}" python3 tools/convert_hf_to_torch_dist.py \
        "${MODEL_ARGS[@]}" \
        --no-gradient-accumulation-fusion \
        --hf-checkpoint "${HF_CKPT}" \
        --save "${REF_CKPT}"
    else
      echo "Converted Megatron torch_dist checkpoint is already present: ${REF_CKPT}"
    fi

    assets_complete
    touch "${ASSETS_READY}"
    echo "Asset preparation complete: ${ASSETS_READY}"
  train.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    RUN_MODE="${RUN_MODE:-canary}"
    RUN_ID="${RUN_ID:-miles-rocm-article-qwen3-30b-a3b-${RUN_MODE}-$(date -u +%Y%m%dT%H%M%SZ)}"
    RUN_BASE="${RUN_BASE:-/mnt/miles/runs}"
    RUN_ROOT="${RUN_ROOT:-${RUN_BASE}/${RUN_ID}}"
    OUTPUT_DIR="${OUTPUT_DIR:-${RUN_ROOT}/output}"
    SAVE_CKPT="${SAVE_CKPT:-${RUN_ROOT}/checkpoints/Qwen3-30B-A3B_miles}"
    LOAD_CKPT="${LOAD_CKPT:-${SAVE_CKPT}}"
    TMP_DIR="${TMP_DIR:-${RUN_ROOT}/tmp}"

    MODEL_ROOT="${MODEL_ROOT:-/mnt/miles/models}"
    DATA_ROOT="${DATA_ROOT:-/mnt/miles/datasets}"
    DATA_DIR="${DATA_DIR:-${DATA_ROOT}}"
    CACHE_ROOT="${CACHE_ROOT:-/mnt/miles/cache}"
    HF_CKPT="${HF_CKPT:-${MODEL_ROOT}/Qwen3-30B-A3B}"
    REF_CKPT="${REF_CKPT:-${MODEL_ROOT}/Qwen3-30B-A3B_torch_dist}"
    ASSETS_READY="${ASSETS_READY:-/mnt/miles/state/qwen3-30b-a3b.assets-ready}"
    ASSET_WAIT_TIMEOUT_SECONDS="${ASSET_WAIT_TIMEOUT_SECONDS:-86400}"
    MILES_CONTAINER_DIR="${MILES_CONTAINER_DIR:-/workspace/miles}"
    MEGATRON_LM_PATH="${MEGATRON_LM_PATH:-}"
    HIP_VISIBLE_DEVICES="${HIP_VISIBLE_DEVICES:-0,1,2,3,4,5,6,7}"
    CUDA_VISIBLE_DEVICES="${CUDA_VISIBLE_DEVICES:-${HIP_VISIBLE_DEVICES}}"
    ROCR_VISIBLE_DEVICES="${ROCR_VISIBLE_DEVICES:-${HIP_VISIBLE_DEVICES}}"
    GPU_DEVICE_ORDINAL="${GPU_DEVICE_ORDINAL:-${HIP_VISIBLE_DEVICES}}"
    RAY_NUM_CPUS="${RAY_NUM_CPUS:-64}"
    RAY_NUM_GPUS="${RAY_NUM_GPUS:-8}"
    RAY_TEMP_DIR="${RAY_TEMP_DIR:-${TMP_DIR}/ray}"
    MILES_ALLOW_PORT_CONFLICTS="${MILES_ALLOW_PORT_CONFLICTS:-0}"

    export HF_HOME="${HF_HOME:-${CACHE_ROOT}/huggingface}"
    export TRANSFORMERS_CACHE="${TRANSFORMERS_CACHE:-${HF_HOME}}"
    export HF_DATASETS_CACHE="${HF_DATASETS_CACHE:-${HF_HOME}/datasets}"
    export TORCH_HOME="${TORCH_HOME:-${CACHE_ROOT}/torch}"
    export PIP_CACHE_DIR="${PIP_CACHE_DIR:-${CACHE_ROOT}/pip}"
    export HF_TOKEN="${HF_TOKEN:-}"
    export HUGGING_FACE_HUB_TOKEN="${HUGGING_FACE_HUB_TOKEN:-${HF_TOKEN}}"

    case "${RUN_MODE}" in
      canary)
        SAVE_CHECKPOINT="${SAVE_CHECKPOINT:-0}"
        CHECKPOINT_KEEP_LAST="${CHECKPOINT_KEEP_LAST:-0}"
        NUM_ROLLOUT="${NUM_ROLLOUT:-1}"
        ROLLOUT_BATCH_SIZE="${ROLLOUT_BATCH_SIZE:-1}"
        N_SAMPLES_PER_PROMPT="${N_SAMPLES_PER_PROMPT:-2}"
        MAX_RESPONSE_LEN="${MAX_RESPONSE_LEN:-512}"
        GLOBAL_BATCH_SIZE="${GLOBAL_BATCH_SIZE:-2}"
        EVAL_INTERVAL="${EVAL_INTERVAL:-0}"
        EVAL_N_SAMPLES_PER_PROMPT="${EVAL_N_SAMPLES_PER_PROMPT:-1}"
        SAVE_INTERVAL="${SAVE_INTERVAL:-1}"
        SGLANG_DISABLE_CUDA_GRAPH="${SGLANG_DISABLE_CUDA_GRAPH:-1}"
        ;;
      minbar)
        SAVE_CHECKPOINT="${SAVE_CHECKPOINT:-1}"
        CHECKPOINT_KEEP_LAST="${CHECKPOINT_KEEP_LAST:-1}"
        NUM_ROLLOUT="${NUM_ROLLOUT:-20}"
        ROLLOUT_BATCH_SIZE="${ROLLOUT_BATCH_SIZE:-32}"
        N_SAMPLES_PER_PROMPT="${N_SAMPLES_PER_PROMPT:-8}"
        MAX_RESPONSE_LEN="${MAX_RESPONSE_LEN:-8192}"
        GLOBAL_BATCH_SIZE="${GLOBAL_BATCH_SIZE:-256}"
        EVAL_INTERVAL="${EVAL_INTERVAL:-5}"
        EVAL_N_SAMPLES_PER_PROMPT="${EVAL_N_SAMPLES_PER_PROMPT:-16}"
        SAVE_INTERVAL="${SAVE_INTERVAL:-5}"
        SGLANG_DISABLE_CUDA_GRAPH="${SGLANG_DISABLE_CUDA_GRAPH:-0}"
        ;;
      article)
        SAVE_CHECKPOINT="${SAVE_CHECKPOINT:-1}"
        CHECKPOINT_KEEP_LAST="${CHECKPOINT_KEEP_LAST:-1}"
        NUM_ROLLOUT="${NUM_ROLLOUT:-3000}"
        ROLLOUT_BATCH_SIZE="${ROLLOUT_BATCH_SIZE:-32}"
        N_SAMPLES_PER_PROMPT="${N_SAMPLES_PER_PROMPT:-8}"
        MAX_RESPONSE_LEN="${MAX_RESPONSE_LEN:-8192}"
        GLOBAL_BATCH_SIZE="${GLOBAL_BATCH_SIZE:-256}"
        EVAL_INTERVAL="${EVAL_INTERVAL:-20}"
        EVAL_N_SAMPLES_PER_PROMPT="${EVAL_N_SAMPLES_PER_PROMPT:-16}"
        SAVE_INTERVAL="${SAVE_INTERVAL:-20}"
        SGLANG_DISABLE_CUDA_GRAPH="${SGLANG_DISABLE_CUDA_GRAPH:-0}"
        ;;
      *)
        echo "Unknown RUN_MODE=${RUN_MODE}; expected canary|minbar|article" >&2
        exit 2
        ;;
    esac

    USE_PROMETHEUS="${USE_PROMETHEUS:-0}"
    PROMETHEUS_PORT="${PROMETHEUS_PORT:-9090}"
    PROMETHEUS_RUN_NAME="${PROMETHEUS_RUN_NAME:-${RUN_ID}}"
    CHECKPOINT_GC_INTERVAL_SECONDS="${CHECKPOINT_GC_INTERVAL_SECONDS:-60}"
    SGLANG_USE_AITER="${SGLANG_USE_AITER:-0}"
    USE_ROCM_AITER_ROPE_BACKEND="${USE_ROCM_AITER_ROPE_BACKEND:-0}"
    SGLANG_MOE_RUNNER_BACKEND="${SGLANG_MOE_RUNNER_BACKEND:-triton}"
    SGLANG_MEM_FRACTION_STATIC="${SGLANG_MEM_FRACTION_STATIC:-0.7}"
    MAX_TOKENS_PER_GPU="${MAX_TOKENS_PER_GPU:-20480}"
    RECOMPUTE_GRANULARITY="${RECOMPUTE_GRANULARITY:-full}"
    RECOMPUTE_METHOD="${RECOMPUTE_METHOD:-uniform}"
    RECOMPUTE_NUM_LAYERS="${RECOMPUTE_NUM_LAYERS:-1}"
    NCCL_DEBUG="${NCCL_DEBUG:-VERSION}"
    NCCL_DEBUG_SUBSYS="${NCCL_DEBUG_SUBSYS:-INIT}"

    mkdir -p "${OUTPUT_DIR}/dump_details" "${SAVE_CKPT}" "${LOAD_CKPT}" "${TMP_DIR}" "${RAY_TEMP_DIR}"

    started_at="$(date +%s)"
    until [[ -f "${ASSETS_READY}" ]]; do
      now="$(date +%s)"
      if (( now - started_at > ASSET_WAIT_TIMEOUT_SECONDS )); then
        echo "Timed out waiting for asset sidecar sentinel: ${ASSETS_READY}" >&2
        exit 20
      fi
      echo "Waiting for asset sidecar sentinel: ${ASSETS_READY}"
      sleep 30
    done

    for path in \
      "${HF_CKPT}/config.json" \
      "${DATA_DIR}/dapo-math-17k/dapo-math-17k.jsonl" \
      "${DATA_DIR}/aime-2024/aime-2024.jsonl"; do
      [[ -e "${path}" ]] || { echo "Missing required asset: ${path}" >&2; exit 21; }
    done
    [[ -f "${REF_CKPT}/latest_checkpointed_iteration.txt" ]] || {
      echo "Missing converted checkpoint: ${REF_CKPT}" >&2
      exit 21
    }

    if [[ "${MILES_ALLOW_PORT_CONFLICTS}" != "1" ]] && command -v ss >/dev/null 2>&1; then
      occupied_port_regex=':(6379|8265|30000|30001|30002|30003|30004|30005|30006|30007)'
      if [[ "${USE_PROMETHEUS}" =~ ^(1|true|TRUE|yes|YES|on|ON)$ ]]; then
        occupied_port_regex=':(6379|8265|30000|30001|30002|30003|30004|30005|30006|30007|'"${PROMETHEUS_PORT}"')'
      fi
      if ss -lntp 2>/dev/null | grep -E -q "${occupied_port_regex}"; then
        echo "Refusing launch: Ray/SGLang/Prometheus port is occupied. Set MILES_ALLOW_PORT_CONFLICTS=1 only if intentional." >&2
        exit 17
      fi
    fi

    resolve_miles_dir() {
      for candidate in "${MILES_CONTAINER_DIR}" /workspace/miles /root/miles /opt/miles /app/miles; do
        [[ -n "${candidate}" ]] || continue
        if [[ -f "${candidate}/train.py" && -f "${candidate}/scripts/models/qwen3-30B-A3B.sh" ]]; then
          printf '%s\n' "${candidate}"
          return 0
        fi
      done
      return 1
    }

    resolve_megatron_dir() {
      if [[ -n "${MEGATRON_LM_PATH}" && -d "${MEGATRON_LM_PATH}" ]]; then
        printf '%s\n' "${MEGATRON_LM_PATH}"
        return 0
      fi
      for candidate in /workspace/Megatron-LM /root/Megatron-LM /app/Megatron-LM /opt/Megatron-LM; do
        if [[ -d "${candidate}" ]]; then
          printf '%s\n' "${candidate}"
          return 0
        fi
      done
      python3 - <<'PY'
    import importlib.util
    import pathlib
    spec = importlib.util.find_spec("megatron")
    if spec and spec.origin:
        print(pathlib.Path(spec.origin).resolve().parents[1])
    PY
    }

    cleanup_runtime() {
      set +e
      pkill -9 sglang
      ray stop --force
      pkill -9 ray
      pkill -9 redis
      set -e
    }

    checkpoint_gc_enabled() {
      [[ "${SAVE_CHECKPOINT}" == "1" ]] || return 1
      [[ "${CHECKPOINT_KEEP_LAST}" =~ ^[0-9]+$ ]] || return 1
      [[ "${CHECKPOINT_GC_INTERVAL_SECONDS}" =~ ^[0-9]+$ ]] || return 1
    }

    checkpoint_gc_once() {
      checkpoint_gc_enabled || return 0
      [[ -d "${SAVE_CKPT}" ]] || return 0
      mapfile -t complete_checkpoints < <(
        find "${SAVE_CKPT}" -mindepth 1 -maxdepth 1 -type d -name 'iter_*' \
          -exec test -f '{}/metadata.json' ';' -print 2>/dev/null | sort
      )
      remove_count=$(( ${#complete_checkpoints[@]} - CHECKPOINT_KEEP_LAST ))
      (( remove_count > 0 )) || return 0
      for checkpoint in "${complete_checkpoints[@]:0:remove_count}"; do
        echo "Removing old complete checkpoint: ${checkpoint}"
        rm -rf -- "${checkpoint}"
      done
    }

    checkpoint_gc_loop() {
      while true; do
        checkpoint_gc_once || true
        sleep "${CHECKPOINT_GC_INTERVAL_SECONDS}"
      done
    }

    MILES_DIR="$(resolve_miles_dir || true)"
    MEGATRON_DIR="$(resolve_megatron_dir || true)"
    if [[ -z "${MILES_DIR}" || -z "${MEGATRON_DIR}" ]]; then
      echo "Could not resolve Miles or Megatron source inside the image." >&2
      exit 5
    fi

    cd "${MILES_DIR}"
    cleanup_runtime
    sleep 3

    export PYTHONUNBUFFERED=1
    export PYTHONPATH="${MILES_DIR}:${MEGATRON_DIR}:${PYTHONPATH:-}"
    export CUDA_DEVICE_MAX_CONNECTIONS=1
    export NCCL_NVLS_ENABLE=0
    export NCCL_PXN_DISABLE=1
    export NCCL_IGNORE_CPU_AFFINITY=1
    export SGLANG_USE_AITER="${SGLANG_USE_AITER}"
    export USE_ROCM_AITER_ROPE_BACKEND="${USE_ROCM_AITER_ROPE_BACKEND}"
    export RAY_EXPERIMENTAL_NOSET_HIP_VISIBLE_DEVICES=1
    export RAY_EXPERIMENTAL_NOSET_CUDA_VISIBLE_DEVICES=1
    export MILES_USE_RAY_VISIBLE_DEVICES=1
    export HIP_VISIBLE_DEVICES="${HIP_VISIBLE_DEVICES}"
    export CUDA_VISIBLE_DEVICES="${CUDA_VISIBLE_DEVICES}"
    export ROCR_VISIBLE_DEVICES="${ROCR_VISIBLE_DEVICES}"
    export GPU_DEVICE_ORDINAL="${GPU_DEVICE_ORDINAL}"
    export NCCL_DEBUG="${NCCL_DEBUG}"
    export NCCL_DEBUG_SUBSYS="${NCCL_DEBUG_SUBSYS}"
    export USE_PROMETHEUS="${USE_PROMETHEUS}"
    export PROMETHEUS_PORT="${PROMETHEUS_PORT}"
    export PROMETHEUS_RUN_NAME="${PROMETHEUS_RUN_NAME}"

    source scripts/models/qwen3-30B-A3B.sh

    CKPT_ARGS=(
      --hf-checkpoint "${HF_CKPT}"
      --ref-load "${REF_CKPT}"
      --load "${LOAD_CKPT}"
    )
    if [[ "${SAVE_CHECKPOINT}" == "1" ]]; then
      CKPT_ARGS+=(--save "${SAVE_CKPT}" --save-interval "${SAVE_INTERVAL}")
    fi

    ROLLOUT_ARGS=(
      --prompt-data "${DATA_DIR}/dapo-math-17k/dapo-math-17k.jsonl"
      --input-key prompt
      --label-key label
      --apply-chat-template
      --rollout-shuffle
      --rm-type deepscaler
      --num-rollout "${NUM_ROLLOUT}"
      --rollout-batch-size "${ROLLOUT_BATCH_SIZE}"
      --n-samples-per-prompt "${N_SAMPLES_PER_PROMPT}"
      --rollout-max-response-len "${MAX_RESPONSE_LEN}"
      --rollout-temperature 1
      --global-batch-size "${GLOBAL_BATCH_SIZE}"
      --balance-data
    )

    EVAL_ARGS=()
    if [[ "${EVAL_INTERVAL}" -gt 0 ]]; then
      EVAL_ARGS+=(
        --eval-interval "${EVAL_INTERVAL}"
        --eval-prompt-data aime "${DATA_DIR}/aime-2024/aime-2024.jsonl"
        --n-samples-per-eval-prompt "${EVAL_N_SAMPLES_PER_PROMPT}"
        --eval-max-response-len 16384
        --eval-top-p 1
      )
    fi

    PERF_ARGS=(
      --tensor-model-parallel-size 4
      --sequence-parallel
      --pipeline-model-parallel-size 1
      --context-parallel-size 1
      --expert-model-parallel-size 8
      --expert-tensor-parallel-size 1
      --recompute-granularity "${RECOMPUTE_GRANULARITY}"
      --recompute-method "${RECOMPUTE_METHOD}"
      --recompute-num-layers "${RECOMPUTE_NUM_LAYERS}"
      --use-dynamic-batch-size
      --max-tokens-per-gpu "${MAX_TOKENS_PER_GPU}"
    )

    GRPO_ARGS=(
      --advantage-estimator grpo
      --use-kl-loss
      --kl-loss-coef 0.00
      --kl-loss-type low_var_kl
      --entropy-coef 0.00
      --eps-clip 0.2
      --eps-clip-high 0.28
    )

    OPTIMIZER_ARGS=(
      --optimizer adam
      --lr 1e-6
      --lr-decay-style constant
      --weight-decay 0.1
      --adam-beta1 0.9
      --adam-beta2 0.98
      --optimizer-cpu-offload
      --overlap-cpu-optimizer-d2h-h2d
      --use-precision-aware-optimizer
    )

    WANDB_ARGS=()
    if [[ -n "${WANDB_API_KEY:-}" ]]; then
      WANDB_ARGS+=(--use-wandb --wandb-project miles-rocm-article --wandb-group qwen3-30B-A3B --wandb-key "${WANDB_API_KEY}")
    fi

    PROMETHEUS_ARGS=()
    if [[ "${USE_PROMETHEUS}" =~ ^(1|true|TRUE|yes|YES|on|ON)$ ]]; then
      PROMETHEUS_ARGS+=(--use-prometheus --prometheus-port "${PROMETHEUS_PORT}")
      [[ -n "${PROMETHEUS_RUN_NAME}" ]] && PROMETHEUS_ARGS+=(--prometheus-run-name "${PROMETHEUS_RUN_NAME}")
    fi

    SGLANG_ARGS=(
      --rollout-num-gpus-per-engine 8
      --sglang-mem-fraction-static "${SGLANG_MEM_FRACTION_STATIC}"
      --sglang-moe-runner-backend "${SGLANG_MOE_RUNNER_BACKEND}"
    )
    if [[ "${SGLANG_DISABLE_CUDA_GRAPH}" == "1" ]]; then
      SGLANG_ARGS+=(--sglang-disable-cuda-graph)
    else
      SGLANG_ARGS+=(--sglang-cuda-graph-bs 1 2 4 8 16 24 32 40 48 56 64 72 80 88 96 104 112 120 128 136 144 152 160 168 176 184 192 200 208 216 224 232 240 248 256)
    fi

    MISC_ARGS=(
      --attention-dropout 0.0
      --hidden-dropout 0.0
      --accumulate-allreduce-grads-in-fp32
      --attention-softmax-in-fp32
      --attention-backend flash
      --actor-num-nodes 1
      --actor-num-gpus-per-node 8
      --num-gpus-per-node 8
      --colocate
      --dump-details "${OUTPUT_DIR}/dump_details"
    )

    echo "RUN_ID=${RUN_ID}"
    echo "RUN_MODE=${RUN_MODE}"
    echo "OUTPUT_DIR=${OUTPUT_DIR}"
    echo "SAVE_CKPT=${SAVE_CKPT}"
    echo "HF_CKPT=${HF_CKPT}"
    echo "REF_CKPT=${REF_CKPT}"
    rocm-smi --showproductname --showuse --showmemuse --showpidgpus || true

    checkpoint_gc_once
    checkpoint_gc_pid=""
    if checkpoint_gc_enabled; then
      checkpoint_gc_loop &
      checkpoint_gc_pid=$!
    fi

    finish() {
      status=$?
      if [[ -n "${checkpoint_gc_pid}" ]]; then
        kill "${checkpoint_gc_pid}" >/dev/null 2>&1 || true
        wait "${checkpoint_gc_pid}" >/dev/null 2>&1 || true
      fi
      cleanup_runtime || true
      checkpoint_gc_once || true
      echo "${status}" > "${OUTPUT_DIR}/exit_code.txt"
      exit "${status}"
    }
    trap finish EXIT

    ray start --head --node-ip-address 127.0.0.1 --port 6379 --num-gpus "${RAY_NUM_GPUS}" --num-cpus "${RAY_NUM_CPUS}" --disable-usage-stats --dashboard-host=0.0.0.0 --dashboard-port=8265 --temp-dir "${RAY_TEMP_DIR}"
    for _ in $(seq 1 45); do
      if curl -sf http://127.0.0.1:8265/api/version >/dev/null; then
        break
      fi
      sleep 2
    done

    RUNTIME_ENV_JSON="$(python3 - <<'PY'
    import json
    import os
    keys = (
        "PYTHONPATH",
        "CUDA_DEVICE_MAX_CONNECTIONS",
        "NCCL_NVLS_ENABLE",
        "SGLANG_USE_AITER",
        "USE_ROCM_AITER_ROPE_BACKEND",
        "HIP_VISIBLE_DEVICES",
        "CUDA_VISIBLE_DEVICES",
        "ROCR_VISIBLE_DEVICES",
        "GPU_DEVICE_ORDINAL",
        "RAY_EXPERIMENTAL_NOSET_HIP_VISIBLE_DEVICES",
        "RAY_EXPERIMENTAL_NOSET_CUDA_VISIBLE_DEVICES",
        "MILES_USE_RAY_VISIBLE_DEVICES",
        "NCCL_DEBUG",
        "NCCL_DEBUG_SUBSYS",
        "NCCL_PXN_DISABLE",
        "NCCL_IGNORE_CPU_AFFINITY",
        "USE_PROMETHEUS",
        "PROMETHEUS_PORT",
        "PROMETHEUS_RUN_NAME",
    )
    print(json.dumps({"env_vars": {key: os.environ[key] for key in keys if key in os.environ}}, separators=(",", ":")))
    PY
    )"

    ray job submit --address "http://127.0.0.1:8265" --runtime-env-json "${RUNTIME_ENV_JSON}" -- python3 train.py \
      "${MODEL_ARGS[@]}" \
      "${CKPT_ARGS[@]}" \
      "${ROLLOUT_ARGS[@]}" \
      "${OPTIMIZER_ARGS[@]}" \
      "${GRPO_ARGS[@]}" \
      "${WANDB_ARGS[@]}" \
      "${PROMETHEUS_ARGS[@]}" \
      "${PERF_ARGS[@]}" \
      "${EVAL_ARGS[@]}" \
      "${SGLANG_ARGS[@]}" \
      "${MISC_ARGS[@]}"
