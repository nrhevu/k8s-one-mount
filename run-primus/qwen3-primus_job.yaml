apiVersion: batch/v1
kind: Job
metadata:
  name: primus-qwen3-4b-bf16-pretrain
  namespace: vunguyen13
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: primus-qwen3-4b-bf16-pretrain
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 60
      nodeSelector:
        kubernetes.io/hostname: vu
      containers:
        - name: trainer
          image: docker.io/rocm/primus:v26.2
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/Primus
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail

              if [[ -z "${EXP_YAML:-}" ]]; then
                echo "EXP_YAML environment variable is required." >&2
                exit 1
              fi
              if [[ -z "${PRIMUS_MODEL_PRESET_PATH:-}" ]]; then
                echo "PRIMUS_MODEL_PRESET_PATH environment variable is required." >&2
                exit 1
              fi
              if [[ -z "${PRIMUS_MODEL_PRESET_YAML:-}" ]]; then
                echo "PRIMUS_MODEL_PRESET_YAML environment variable is required." >&2
                exit 1
              fi

              mkdir -p "$(dirname "$EXP")" "$(dirname "$PRIMUS_MODEL_PRESET_PATH")" output data "${HF_HOME}"
              printf '%s\n' "$PRIMUS_MODEL_PRESET_YAML" > "$PRIMUS_MODEL_PRESET_PATH"
              printf '%s\n' "$EXP_YAML" > "$EXP"

              bash examples/run_pretrain.sh
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: NNODES
              value: "1"
            - name: NODE_RANK
              value: "0"
            - name: GPUS_PER_NODE
              value: "1"
            - name: MASTER_ADDR
              value: localhost
            - name: MASTER_PORT
              value: "1234"
            - name: DATA_PATH
              value: /workspace/Primus/data
            - name: HF_HOME
              value: /workspace/Primus/data/huggingface
            - name: PRIMUS_WORKSPACE
              value: /workspace/Primus/output
            - name: EXP
              value: /tmp/primus-exp/exp.yaml
            - name: TRAIN_LOG
              value: output/log_mp_train_qwen3-4b-bf16_bookcorpus_data.txt
            - name: PRIMUS_MODEL_PRESET_PATH
              value: /workspace/Primus/primus/configs/models/megatron/qwen3_4B.yaml
            - name: PRIMUS_MODEL_PRESET_YAML
              value: |
                extends:
                  - qwen2.5_base.yaml

                tokenizer_type: HuggingFaceTokenizer
                tokenizer_model: Qwen/Qwen3-4B

                # Qwen 3 4B specific parameters
                hidden_size: 2560
                ffn_hidden_size: 9728
                num_layers: 36
                num_attention_heads: 32
                num_query_groups: 8
            - name: EXP_YAML
              value: |
                work_group: ${PRIMUS_TEAM:amd}
                user_name: ${PRIMUS_USER:root}
                exp_name: ${PRIMUS_EXP_NAME:qwen3_4B-pretrain}
                workspace: ${PRIMUS_WORKSPACE:./output}

                modules:
                  pre_trainer:
                    framework: megatron
                    config: pre_trainer.yaml

                    model: qwen3_4B.yaml
                    overrides:
                      wandb_project: "Primus_Qwen_Pretrain"
                      stderr_sink_level: DEBUG

                      log_avg_skip_iterations: 2
                      log_avg_reset_interval: 50

                      train_iters: 10
                      micro_batch_size: 2
                      global_batch_size: 128

                      seq_length: 8192
                      max_position_embeddings: 8192

                      lr: 1.0e-5
                      min_lr: 0.0
                      lr_warmup_iters: 2
                      lr_decay_iters: null
                      lr_decay_style: cosine
                      weight_decay: 0.1
                      adam_beta1: 0.9
                      adam_beta2: 0.95
                      eod_mask_loss: true
                      init_method_std: 0.008
                      norm_epsilon: 1.0e-6

                      tensor_model_parallel_size: 1
                      pipeline_model_parallel_size: 1
                      expert_model_parallel_size: 1
                      overlap_grad_reduce: true
                      overlap_param_gather: true
                      gradient_accumulation_fusion: false

                      mock_data: false
                      train_data_path: data/bookcorpus/HuggingFaceTokenizer/bookcorpus_train_text_sentence
                      valid_data_path: null
                      test_data_path: null

                      finetune: false
                      auto_continue_train: false
                      load: null
                      no_load_optim: null
                      no_load_rng: null
                      save: null
                      save_interval: 20000
                      no_save_optim: null
                      no_save_rng: null
                      disable_last_saving: true
                      ckpt_format: torch

                      cross_entropy_fusion_impl: "te"
                      cross_entropy_loss_fusion: true
          resources:
            requests:
              cpu: "16"
              memory: 128Gi
              amd.com/gpu: "1"
            limits:
              cpu: "16"
              memory: 128Gi
              amd.com/gpu: "1"
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_PTRACE
                - SYS_ADMIN
            seccompProfile:
              type: Unconfined
          volumeMounts:
            - name: primus-data
              mountPath: /workspace/Primus/data
            - name: primus-hf-home
              mountPath: /workspace/Primus/data/huggingface
            - name: primus-output
              mountPath: /workspace/Primus/output
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: primus-data
          persistentVolumeClaim:
            claimName: primus-qwen3-4b-data-pvc
        - name: primus-hf-home
          persistentVolumeClaim:
            claimName: primus-qwen3-4b-hf-home-pvc
        - name: primus-output
          persistentVolumeClaim:
            claimName: primus-qwen3-4b-output-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
